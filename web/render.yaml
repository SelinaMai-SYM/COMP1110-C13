# What it does:
#   Describes the Render deployment for the API service and static dashboard.
# Inputs:
#   Repository directories, build commands, start command, and environment variables.
# Outputs:
#   Render-managed web and static services for the project.
services:
  - type: web
    name: COMP-1110-C13
    env: python
    rootDir: code
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn restaurant_simulation.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3

  - type: static
    name: comp-1110-c13-dashboard
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://comp-1110-c13.onrender.com
