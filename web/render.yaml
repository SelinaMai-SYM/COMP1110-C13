services:
  - type: web
    name: restaurant-simulation-api
    env: python
    rootDir: code
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn restaurant_simulation.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3

  - type: static
    name: restaurant-simulation-dashboard
    rootDir: web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://restaurant-simulation-api.onrender.com
