<!doctype html>
<html lang="en">
  <head>
    <!--
    - What it does:
      Provides the browser document shell for the React dashboard.
    - Inputs:
      Static metadata, favicon, viewport settings, and the Vite module entry.
    - Outputs:
      A root DOM node where src/main.tsx mounts the application.
    -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Compare restaurant configurations, waitlist setups, booking rules, and service policies across prepared scenario pairs and custom A/B comparisons."
    />
    <meta name="theme-color" content="#081120" />
    <title>Restaurant Configuration and Queue Comparison</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
